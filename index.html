<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Rhythm Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg: #050505;
            --neon-blue: #00f3ff;
            --neon-pink: #ff007c;
            --neon-green: #39ff14;
            --neon-yellow: #ffea00;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* --- MENUS --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .difficulty-container {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.9); }
        .btn.active { background: white; color: black; box-shadow: 0 0 15px white; }

        .btn-play {
            background: var(--neon-pink);
            border: none;
            padding: 15px 60px;
            font-size: 1.5rem;
            border-radius: 50px;
            font-weight: 900;
            box-shadow: 0 0 20px var(--neon-pink);
            margin-top: 30px;
            display: none;
        }

        #file-info { margin-top: 15px; color: var(--neon-blue); font-size: 0.8rem; }

        /* --- JOGO --- */
        #game-ui {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            pointer-events: none;
            z-index: 5;
        }

        canvas { display: block; }

        /* --- RESULTADO --- */
        #result-screen { display: none; }
        .stat-box { font-size: 4rem; color: var(--neon-green); margin: 20px 0; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>NEON RHYTHM</h1>
        <p>Selecione um arquivo (Áudio/Vídeo - Máx 5m)</p>
        
        <input type="file" id="fileInput" accept="audio/*, video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 ABRIR GALERIA</button>
        <div id="file-info">Nenhum arquivo selecionado</div>

        <div class="difficulty-container">
            <button class="btn diff-btn" onclick="setDiff('EASY', this)">FÁCIL</button>
            <button class="btn diff-btn active" onclick="setDiff('MED', this)">MÉDIO</button>
            <button class="btn diff-btn" onclick="setDiff('HARD', this)">DIFÍCIL</button>
        </div>

        <button id="playBtn" class="btn-play" onclick="startGame()">JOGAR</button>
    </div>

    <div id="result-screen" class="screen">
        <h2>CONCLUÍDO!</h2>
        <div class="stat-box" id="final-percent">0%</div>
        <button class="btn" onclick="restartGame()">REFAZER</button>
        <button class="btn" onclick="backToMenu()" style="margin-top:10px; border-color: var(--neon-pink)">VOLTAR AO MENU</button>
    </div>

    <div id="game-ui" style="display:none"><span id="percentDisplay">100.0</span>%</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const fileInput = document.getElementById('fileInput');

        let audioCtx, audioBuffer, audioSource, startTime;
        let isPlaying = false;
        let notes = [];
        let score = 0, totalPossible = 0;
        let difficulty = 'MED';
        
        const COLS = 4;
        const COL_W = window.innerWidth / COLS;
        const HIT_Y = window.innerHeight * 0.85;
        const NOTE_SPEED = window.innerHeight * 0.7; // px por seg
        const colColors = ['#ff007c', '#00f3ff', '#39ff14', '#ffea00'];

        // Controle de Toque
        let activeTouches = {}; // col: true/false

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function setDiff(d, btn) {
            difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-info').innerText = "Processando: " + file.name;
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = await file.arrayBuffer();
            
            audioCtx.decodeAudioData(buffer, (decoded) => {
                if (decoded.duration > 300) {
                    alert("Máximo 5 minutos!");
                    return;
                }
                audioBuffer = decoded;
                playBtn.style.display = 'block';
                document.getElementById('file-info').innerText = "Pronto para o show!";
            });
        };

        function detectNotes(buffer) {
            const data = buffer.getChannelData(0);
            const sr = buffer.sampleRate;
            const step = sr * 0.1; 
            const detected = [];
            
            // Ajuste de sensibilidade por dificuldade
            const sens = { 'EASY': 4.0, 'MED': 2.8, 'HARD': 1.8 }[difficulty];
            const speedMult = { 'EASY': 0.7, 'MED': 1.0, 'HARD': 1.4 }[difficulty];

            let totalVol = 0;
            for(let i=0; i<data.length; i+=200) totalVol += Math.abs(data[i]);
            const avg = totalVol / (data.length / 200);

            for (let i = 0; i < data.length; i += step) {
                let chunkMax = 0;
                for(let j=0; j<step && (i+j)<data.length; j++) {
                    if(Math.abs(data[i+j]) > chunkMax) chunkMax = Math.abs(data[i+j]);
                }

                if (chunkMax > avg * sens) {
                    const time = i / sr;
                    const rand = Math.random();
                    let type = 'tap';
                    let duration = 0;
                    let endCol = Math.floor(Math.random() * 4);

                    // Gerar tipos diferentes de notas
                    if (rand > 0.85) {
                        type = 'hold';
                        duration = 0.4 + Math.random() * 0.6;
                    } else if (rand > 0.75) {
                        type = 'slide';
                        endCol = (endCol + 1) % 4;
                    }

                    detected.push({
                        time, type, duration, 
                        col: Math.floor(Math.random() * 4),
                        endCol, hit: false, holdProgress: 0
                    });
                }
            }
            return detected;
        }

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            notes = detectNotes(audioBuffer);
            totalPossible = notes.length;
            score = 0;
            
            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(audioCtx.destination);
            
            isPlaying = true;
            startTime = audioCtx.currentTime;
            audioSource.start();
            audioSource.onended = showResults;
            
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            Array.from(e.touches).forEach(t => {
                const col = Math.floor(t.clientX / COL_W);
                activeTouches[col] = true;
            });
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            activeTouches = {};
            Array.from(e.touches).forEach(t => {
                const col = Math.floor(t.clientX / COL_W);
                activeTouches[col] = true;
            });
        });

        function gameLoop() {
            if (!isPlaying) return;
            const now = audioCtx.currentTime - startTime;
            
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar Trilhas
            for(let i=0; i<COLS; i++) {
                ctx.fillStyle = activeTouches[i] ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.02)';
                ctx.fillRect(i*COL_W, 0, COL_W, canvas.height);
                if(activeTouches[i]) {
                    ctx.fillStyle = colColors[i];
                    ctx.fillRect(i*COL_W, HIT_Y, COL_W, 5);
                }
            }

            notes.forEach(n => {
                if (n.hit) return;
                const y = HIT_Y - ((n.time - now) * NOTE_SPEED);

                if (y > canvas.height + 100) return;

                ctx.shadowBlur = 15;
                ctx.shadowColor = colColors[n.col];
                ctx.fillStyle = colColors[n.col];

                if (n.type === 'tap') {
                    ctx.fillRect(n.col * COL_W + 10, y, COL_W - 20, 40);
                    if (activeTouches[n.col] && Math.abs(y - HIT_Y) < 50) {
                        n.hit = true; score++;
                    }
                } 
                else if (n.type === 'hold') {
                    const tailH = n.duration * NOTE_SPEED;
                    ctx.globalAlpha = 0.5;
                    ctx.fillRect(n.col * COL_W + 20, y - tailH, COL_W - 40, tailH);
                    ctx.globalAlpha = 1.0;
                    ctx.fillRect(n.col * COL_W + 10, y, COL_W - 20, 40);
                    
                    if (activeTouches[n.col] && y >= HIT_Y && (y - tailH) <= HIT_Y) {
                        n.holdProgress += 0.02;
                        if(n.holdProgress >= 1) { n.hit = true; score++; }
                    }
                }
                else if (n.type === 'slide') {
                    ctx.beginPath();
                    ctx.moveTo(n.col * COL_W + COL_W/2, y);
                    ctx.lineTo(n.endCol * COL_W + COL_W/2, y - 100);
                    ctx.strokeStyle = colColors[n.col];
                    ctx.lineWidth = 10;
                    ctx.stroke();
                    ctx.fillRect(n.col * COL_W + 10, y, COL_W - 20, 40);

                    if (activeTouches[n.col] && Math.abs(y - HIT_Y) < 50) {
                        n.hit = true; score++;
                    }
                }
                ctx.shadowBlur = 0;
            });

            const percent = ((score / totalPossible) * 100).toFixed(1);
            document.getElementById('percentDisplay').innerText = percent;

            requestAnimationFrame(gameLoop);
        }

        function showResults() {
            isPlaying = false;
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-percent').innerText = document.getElementById('percentDisplay').innerText + "%";
        }

        function restartGame() {
            document.getElementById('result-screen').style.display = 'none';
            startGame();
        }

        function backToMenu() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            playBtn.style.display = 'none';
            document.getElementById('file-info').innerText = "Nenhum arquivo selecionado";
        }
    </script>
</body>
</html>
