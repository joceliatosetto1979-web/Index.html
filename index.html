<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano AR Pro v7 - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* --- UI: Menu e Tutorial --- */
        #sideMenu { height: 100%; width: 0; position: fixed; z-index: 20; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.5s; padding-top: 60px; box-shadow: 2px 0 15px black; }
        #sideMenu a { padding: 10px 32px; text-decoration: none; font-size: 18px; color: #818181; display: block; cursor: pointer; transition: 0.3s; }
        #sideMenu a:hover { color: #4CAF50; background: #222; }
        
        #tutorialOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .tutorial-box { background: #1e1e1e; padding: 40px; border-radius: 20px; border: 2px solid #4CAF50; max-width: 500px; text-align: center; box-shadow: 0 0 30px rgba(76, 175, 80, 0.3); }

        /* --- Interface --- */
        .header { width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-bottom: 2px solid #333; }
        canvas { border: 3px solid #4CAF50; border-radius: 12px; margin-top: 10px; max-width: 95vw; background-color: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .controls { margin-top: 15px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; align-items: center; padding-bottom: 20px; }
        .slider-container { background: #252525; padding: 12px 20px; border-radius: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #444; }
        
        button { padding: 12px 24px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background-color: #4CAF50; color: white; transition: 0.2s; }
        button:hover { background-color: #45a049; transform: scale(1.02); }
        #btnAdjust { background-color: #2196F3; }
        #btnAdjust.active { background-color: #ff9800; animation: blink 1.5s infinite; }
        #btnStopRecord { background-color: #f44336; display: none; }
        video { display: none; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="tutorialOverlay">
        <div class="tutorial-box" id="tutorialContent"></div>
    </div>

    <div id="sideMenu">
        <a href="javascript:void(0)" onclick="toggleMenu(0)" style="font-size:30px; position: absolute; right: 20px; top: 10px;">&times;</a>
        <p style="color: #4CAF50; padding: 0 32px; font-weight: bold; margin-top: 20px;">AJUSTES</p>
        <a onclick="startTutorial()">📖 Ver Tutorial</a>
        <a onclick="location.reload()">🔄 Reiniciar</a>
    </div>

    <div class="header">
        <button onclick="toggleMenu(250)">☰ Menu</button>
        <h3 id="noteDisplay" style="margin: 0; color: #4CAF50;">Piano: Sol a Fá</h3>
        <div style="width: 80px;"></div>
    </div>

    <canvas id="canvasElement" width="1000" height="550"></canvas>

    <div class="controls">
        <button id="btnStart">🎹 Ligar Sistema</button>
        
        <div class="slider-container">
            <span>Mover Oitavas:</span>
            <input type="range" id="noteSlider" min="0" max="15" value="7">
        </div>

        <button id="btnAdjust">🎯 Ajustar Posição</button>
        <button id="btnPhoto" disabled>📸 Foto</button>
        <button id="btnRecord" disabled>🎥 Gravar</button>
        <button id="btnStopRecord">⏹️ Parar</button>
    </div>

    <video id="videoElement" autoplay playsinline></video>

    <script>
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('videoElement');
        const noteSlider = document.getElementById('noteSlider');
        const noteDisplay = document.getElementById('noteDisplay');

        // --- BANCO DE NOTAS (3 OITAVAS) ---
        const allWhiteNotes = [];
        const noteNames = ["Dó", "Ré", "Mi", "Fá", "Sol", "Lá", "Si"];
        const baseFreqs = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94];
        
        for(let oct=0; oct<3; oct++) {
            noteNames.forEach((name, i) => {
                allWhiteNotes.push({ name: name, freq: baseFreqs[i] * Math.pow(2, oct) });
            });
        }
        allWhiteNotes.push({ name: "Dó", freq: 1046.50 });

        // --- ESTADO ---
        let pianoPos = { x: 100, y: 280 };
        let isAdjusting = false;
        let isDragging = false;
        let currentOffset = 7; 
        const GAP = 10;
        const BLACK_PATTERN = [true, true, false, true, true, true, false];

        // --- SISTEMA DE TUTORIAL ---
        let stepIdx = 0;
        const tutorial = [
            { t: "Bem-vindo!", c: "Desenhe 7 teclas no papel. Use o botão azul para alinhar o piano virtual com o seu desenho." },
            { t: "Mover Notas", c: "Use o controle deslizante para escolher quais notas quer tocar nas 7 teclas." },
            { t: "Toque de 40%", c: "Abaixe o dedo indicador até passar da linha amarela para o som sair." },
            { t: "Sem Conflitos", c: "As teclas pretas têm prioridade total. Se tocar nelas, as brancas embaixo não tocam!" }
        ];

        function updateTutorial() {
            const s = tutorial[stepIdx];
            document.getElementById('tutorialContent').innerHTML = `
                <h2 style="color:#4CAF50">${s.t}</h2>
                <p style="font-size:18px; line-height:1.6">${s.c}</p>
                <div style="margin-top:30px">
                    <button onclick="closeTutorial()" style="background:#555">Pular</button>
                    ${stepIdx < tutorial.length - 1 ? `<button onclick="nextStep()" style="margin-left:10px">Próximo</button>` : `<button onclick="closeTutorial()" style="margin-left:10px">Começar!</button>`}
                </div>`;
        }
        function nextStep() { stepIdx++; updateTutorial(); }
        function closeTutorial() { document.getElementById('tutorialOverlay').style.display = 'none'; }
        function startTutorial() { stepIdx = 0; document.getElementById('tutorialOverlay').style.display = 'flex'; toggleMenu(0); updateTutorial(); }
        updateTutorial();

        // --- LÓGICA DE CONTROLES ---
        noteSlider.oninput = () => {
            currentOffset = parseInt(noteSlider.value);
            noteDisplay.innerText = `Piano: ${allWhiteNotes[currentOffset].name} a ${allWhiteNotes[currentOffset+6].name}`;
        };

        document.getElementById('btnAdjust').onclick = () => {
            isAdjusting = !isAdjusting;
            document.getElementById('btnAdjust').classList.toggle('active');
        };

        canvas.onmousedown = () => { if(isAdjusting) isDragging = true; };
        window.onmouseup = () => isDragging = false;
        canvas.onmousemove = (e) => {
            if(isDragging && isAdjusting) {
                const rect = canvas.getBoundingClientRect();
                pianoPos.x += e.movementX * (canvas.width / rect.width);
                pianoPos.y += e.movementY * (canvas.height / rect.height);
            }
        };

        // --- ÁUDIO ---
        let audioCtx, activeNotes = {}, currentId = null;

        function playNote(id, freq) {
            if (!audioCtx || activeNotes[id]) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); activeNotes[id] = { osc, g };
        }

        function stopNote(id) {
            if (!activeNotes[id]) return;
            const { osc, g } = activeNotes[id];
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
            delete activeNotes[id];
        }

        // --- IA E PROCESSAMENTO ---
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.8 });

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Desenha Câmera Espelhada ao Fundo
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            const kw_full = 110;
            const kw = kw_full - GAP;
            const kh = 230;
            let tid = null, tfreq = 0;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const tip = results.multiHandLandmarks[0][8];
                const fx = (1 - tip.x) * canvas.width;
                const fy = tip.y * canvas.height;

                // 1. PRIORIDADE: TECLAS PRETAS (Transparentes)
                for(let i=0; i<6; i++) {
                    if(BLACK_PATTERN[(currentOffset + i) % 7]) {
                        const bx = pianoPos.x + (i * kw_full) + (kw_full * 0.65);
                        const bw = kw_full * 0.7; 
                        const bh = kh * 0.6;
                        if(fx > bx && fx < bx + bw && fy > pianoPos.y + (bh * 0.2) && fy < pianoPos.y + bh) {
                            tfreq = allWhiteNotes[currentOffset + i].freq * 1.05946;
                            tid = "b"+i;
                            break; 
                        }
                    }
                }

                // 2. TECLAS BRANCAS (Transparentes)
                if(!tid) {
                    for(let i=0; i<7; i++) {
                        const wx = pianoPos.x + (i * kw_full);
                        if(fx > wx && fx < wx + kw && fy > pianoPos.y + (kh * 0.4) && fy < pianoPos.y + kh) {
                            tfreq = allWhiteNotes[currentOffset + i].freq;
                            tid = "w"+i;
                            break;
                        }
                    }
                }
            }

            if(tid !== currentId) {
                if(currentId) stopNote(currentId);
                if(tid) playNote(tid, tfreq);
                currentId = tid;
            }

            // --- DESENHO VISUAL ---
            if(isAdjusting) { 
                ctx.strokeStyle="#2196F3"; ctx.lineWidth=3; ctx.setLineDash([10, 5]);
                ctx.strokeRect(pianoPos.x-5, pianoPos.y-5, (7*kw_full)+5, kh+10);
                ctx.setLineDash([]);
            }

            for(let i=0; i<7; i++) {
                const x = pianoPos.x + (i * kw_full);
                ctx.fillStyle = (currentId === "w"+i) ? "rgba(76, 175, 80, 0.6)" : "rgba(255,255,255,0.2)";
                ctx.fillRect(x, pianoPos.y, kw, kh);
                ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.strokeRect(x, pianoPos.y, kw, kh);
                ctx.fillStyle = "rgba(255, 255, 0, 0.9)"; ctx.fillRect(x, pianoPos.y + (kh * 0.4), kw, 3);
            }

            for(let i=0; i<6; i++) {
                if(BLACK_PATTERN[(currentOffset + i) % 7]) {
                    const bx = pianoPos.x + (i * kw_full) + (kw_full * 0.65);
                    ctx.fillStyle = (currentId === "b"+i) ? "rgba(0, 255, 0, 0.7)" : "rgba(0,0,0,0.7)";
                    ctx.fillRect(bx, pianoPos.y, kw_full * 0.7, kh * 0.6);
                    ctx.strokeStyle = "white"; ctx.strokeRect(bx, pianoPos.y, kw_full * 0.7, kh * 0.6);
                }
            }
        }

        hands.onResults(onResults);

        // --- BOTÃO START COM PERMISSÃO FORÇADA ---
        document.getElementById('btnStart').onclick = async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                const cam = new Camera(video, {
                    onFrame: async () => { await hands.send({image: video}); },
                    width: 1000, height: 550
                });
                cam.start();
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnPhoto').disabled = false;
                document.getElementById('btnRecord').disabled = false;
            } catch (err) {
                alert("Permissão de câmera negada ou erro técnico.");
            }
        };

        function toggleMenu(w) { document.getElementById("sideMenu").style.width = w + "px"; }
    </script>
</body>
    </html>
