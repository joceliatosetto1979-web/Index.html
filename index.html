<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Beat Sync Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #050508;
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --danger: #ff3366;
            --col-0: #00d2ff; --col-1: #ff007c; --col-2: #ff007c; --col-3: #00d2ff;
        }

        * { box-sizing: border-box; font-family: 'Rajdhani', sans-serif; user-select: none; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; overflow: hidden; height: 100vh; touch-action: none; }

        /* --- Telas de Interface --- */
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #11111a 0%, #000 100%); z-index: 10; padding: 20px; }
        .screen.active { display: flex; }

        .panel { background: rgba(20, 20, 30, 0.9); padding: 30px; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.3); backdrop-filter: blur(15px); text-align: center; width: 100%; max-width: 450px; box-shadow: 0 0 50px #000; }
        
        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 15px var(--primary); }
        .btn { background: linear-gradient(45deg, var(--primary), #00b3ff); color: #000; border: none; padding: 15px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; margin-top: 15px; }
        .btn:active { transform: scale(0.95); }

        /* --- HUD do Jogo --- */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        .stats-top { display: flex; justify-content: space-between; padding: 15px 25px; font-size: 1.2rem; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .hp-box { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 8px; border: 1px solid #333; }
        #hp-bar { height: 100%; width: 100%; background: var(--primary); transition: 0.3s; box-shadow: 0 0 10px var(--primary); }
        
        #combo-display { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); text-align: center; opacity: 0; transition: 0.1s; }
        #combo-num { font-size: 5rem; font-weight: 700; display: block; }
        #judgment { font-size: 2rem; font-weight: bold; text-transform: uppercase; margin-top: -10px; }

        /* --- Pista e Notas (Responsivo) --- */
        #highway { position: relative; width: 100%; max-width: 500px; height: 100%; background: rgba(0,0,0,0.6); margin: 0 auto; display: none; border-left: 1px solid #222; border-right: 1px solid #222; }
        .track-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.05); }
        
        #receptors { position: absolute; bottom: 10%; width: 100%; height: 80px; display: flex; padding: 0 5px; gap: 8px; z-index: 4; }
        .receptor { flex: 1; border: 2px solid #444; border-radius: 12px; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; color: #555; transition: 0.1s; }
        .receptor.active { transform: translateY(5px); border-color: #fff; color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }

        .note { position: absolute; width: calc(25% - 12px); height: 20px; border-radius: 6px; will-change: transform; z-index: 3; }
        .note-0 { background: var(--col-0); box-shadow: 0 0 15px var(--col-0); }
        .note-1 { background: var(--col-1); box-shadow: 0 0 15px var(--col-1); }
        .note-2 { background: var(--col-2); box-shadow: 0 0 15px var(--col-2); }
        .note-3 { background: var(--col-3); box-shadow: 0 0 15px var(--col-3); }

        /* --- Loading Spinner --- */
        .loader { width: 60px; height: 60px; border: 5px solid #1a1a24; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            #receptors { bottom: 15%; } /* Mais alto no mobile para não bater na barra do sistema */
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="stats-top">
            <div>SCORE: <span id="score-text">0</span><div class="hp-box"><div id="hp-bar"></div></div></div>
            <div style="text-align:right">ACC: <span id="acc-text">100%</span><br><small>ESC p/ Pausar</small></div>
        </div>
        <div id="combo-display"><span id="combo-num">0</span><div id="judgment"></div></div>
    </div>

    <div id="menu-screen" class="screen active">
        <div class="panel">
            <h1>BEAT SYNC <span style="color:var(--primary)">ULTIMATE</span></h1>
            <p style="color:#888; margin-bottom:15px">Escolha uma música para gerar o desafio</p>
            <label for="audio-upload" style="display:block; border:2px dashed var(--primary); padding:15px; border-radius:10px; cursor:pointer; color:var(--primary); font-weight:bold;" id="file-label">📁 CARREGAR MÚSICA</label>
            <input type="file" id="audio-upload" accept="audio/*, video/*" style="display:none">
            
            <div style="margin-top:15px; text-align:left">
                <label style="font-size:0.9rem; color:#aaa">Dificuldade:</label>
                <select id="diff-select" style="width:100%; padding:10px; background:#111; color:#fff; border:1px solid #444; border-radius:8px;">
                    <option value="1">Fácil (Relaxante)</option>
                    <option value="3" selected>Normal (Recomendado)</option>
                    <option value="5">Insano (Veloz)</option>
                </select>
            </div>
            <button class="btn" id="start-btn">JOGAR AGORA</button>
            <p id="error-log" style="color:var(--danger); margin-top:10px; font-size:0.9rem"></p>
        </div>
    </div>

    <div id="loading-screen" class="screen"><div class="loader"></div><h2 style="margin-top:20px">SINCRONIZANDO O RITMO...</h2></div>

    <div id="highway">
        <div class="track-line" style="left:25%"></div><div class="track-line" style="left:50%"></div><div class="track-line" style="left:75%"></div>
        <div id="receptors">
            <div class="receptor" id="rec-0">D</div><div class="receptor" id="rec-1">F</div>
            <div class="receptor" id="rec-2">J</div><div class="receptor" id="rec-3">K</div>
        </div>
    </div>

    <div id="pause-screen" class="screen">
        <div class="panel"><h1>PAUSADO</h1><button class="btn" id="resume-btn">CONTINUAR</button><button class="btn" style="background:#333; color:#fff" onclick="location.reload()">SAIR</button></div>
    </div>

    <div id="result-screen" class="screen">
        <div class="panel">
            <h2 id="res-title">PERFEITO!</h2>
            <div id="res-grade" style="font-size:7rem; margin:10px 0; font-weight:bold">S</div>
            <div id="res-stats" style="text-align:left; background:rgba(0,0,0,0.3); padding:15px; border-radius:10px; font-size:1.1rem; line-height:1.6"></div>
            <button class="btn" onclick="location.reload()">NOVA MÚSICA</button>
        </div>
    </div>

    <audio id="bgm-player"></audio>
     <script>
    const UI = {
        menu: document.getElementById('menu-screen'), loading: document.getElementById('loading-screen'),
        highway: document.getElementById('highway'), gameUI: document.getElementById('game-ui'),
        pause: document.getElementById('pause-screen'), result: document.getElementById('result-screen'),
        player: document.getElementById('bgm-player'), receptors: Array.from(document.querySelectorAll('.receptor')),
        hpBar: document.getElementById('hp-bar'), comboDiv: document.getElementById('combo-display'),
        judgment: document.getElementById('judgment'), scoreText: document.getElementById('score-text'),
        accText: document.getElementById('acc-text'), error: document.getElementById('error-log')
    };

    let audioCtx, audioBuffer, state = {
        isPlaying: false, isPaused: false, map: [], activeNotes: [],
        startTime: 0, pauseTime: 0, timeOffset: 0,
        stats: { score: 0, combo: 0, maxCombo: 0, hits: 0, perfect: 0, good: 0, bad: 0, miss: 0, hp: 100 }
    };

    const CONFIG = {
        keys: ['d', 'f', 'j', 'k'],
        scrollTime: 1.5, // Segundos para a nota descer
        windows: { perfect: 0.06, good: 0.12, bad: 0.18 }
    };

    // --- Seleção de Arquivo ---
    document.getElementById('audio-upload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        UI.player.src = URL.createObjectURL(file);
        document.getElementById('file-label').innerText = "✅ " + file.name.substring(0, 15) + "...";
    };

    // --- Motor de Análise Rítmica (Beat Detection) ---
    async function analyzeAudio(buffer, diff) {
        const data = buffer.getChannelData(0);
        const sampleRate = buffer.sampleRate;
        const map = [];
        const sensitivity = 0.98 - (diff * 0.1); 
        
        let maxPeak = 0;
        for (let i = 0; i < data.length; i += 1000) if(Math.abs(data[i]) > maxPeak) maxPeak = Math.abs(data[i]);

        const threshold = maxPeak * sensitivity;
        const minSpacing = 0.18 - (diff * 0.02); // Espaçamento entre notas
        let lastNoteTime = 0;

        for (let i = 0; i < data.length; i += 500) {
            const time = i / sampleRate;
            if (Math.abs(data[i]) > threshold && (time - lastNoteTime) > minSpacing) {
                map.push({ time, col: Math.floor(Math.random() * 4), hit: false, id: `n-${i}` });
                lastNoteTime = time;
            }
        }
        state.map = map;
        state.totalNotes = map.length;
    }

    // --- Botão Start ---
    document.getElementById('start-btn').onclick = async () => {
        if (!UI.player.src) { UI.error.innerText = "Selecione uma música primeiro!"; return; }
        
        UI.menu.classList.remove('active');
        UI.loading.classList.add('active');

        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const file = document.getElementById('audio-upload').files[0];
            const arrayBuffer = await file.arrayBuffer();
            audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const diff = parseInt(document.getElementById('diff-select').value);
            CONFIG.scrollTime = 2.0 - (diff * 0.25);
            
            await analyzeAudio(audioBuffer, diff);
            initGame();
        } catch (err) {
            UI.error.innerText = "Erro ao processar áudio.";
            UI.loading.classList.remove('active');
            UI.menu.classList.add('active');
        }
    };
         // --- Lógica de Execução ---
    function initGame() {
        UI.loading.classList.remove('active');
        UI.highway.style.display = 'block';
        UI.gameUI.style.display = 'block';

        state.stats = { score: 0, combo: 0, maxCombo: 0, hits: 0, perfect: 0, good: 0, bad: 0, miss: 0, hp: 100 };
        state.activeNotes = [];
        updateHUD();

        UI.player.currentTime = 0;
        UI.player.play();
        state.startTime = audioCtx.currentTime;
        state.isPlaying = true;
        
        UI.player.onended = () => finishGame(true);
        requestAnimationFrame(updateFrame);
    }

    function updateFrame() {
        if (!state.isPlaying || state.isPaused) return;

        const now = audioCtx.currentTime - state.startTime + state.timeOffset;
        const hHeight = UI.highway.clientHeight;
        const hitY = hHeight * 0.90; // Receptor a 90% da altura

        // Spawn de Notas
        while (state.map.length > 0 && state.map[0].time <= now + CONFIG.scrollTime) {
            const n = state.map.shift();
            const div = document.createElement('div');
            div.className = `note note-${n.col}`;
            div.id = n.id;
            div.style.left = `calc(${n.col * 25}% + 6px)`;
            UI.highway.appendChild(div);
            state.activeNotes.push(n);
        }

        // Movimentação e Miss
        for (let i = state.activeNotes.length - 1; i >= 0; i--) {
            const n = state.activeNotes[i];
            const el = document.getElementById(n.id);
            if (!el) continue;

            const diff = n.time - now;
            const pos = (1 - (diff / CONFIG.scrollTime)) * hitY;
            el.style.transform = `translateY(${pos}px)`;

            if (diff < -CONFIG.windows.bad) {
                handleHit('miss');
                el.remove();
                state.activeNotes.splice(i, 1);
            }
        }
        requestAnimationFrame(updateFrame);
    }

    // --- Inputs Profissionais (Touch + Keys) ---
    function triggerInput(col) {
        if (!state.isPlaying || state.isPaused) return;
        UI.receptors[col].classList.add('active');
        setTimeout(() => UI.receptors[col].classList.remove('active'), 100);

        const now = audioCtx.currentTime - state.startTime + state.timeOffset;
        const targetIdx = state.activeNotes.findIndex(n => n.col === col && !n.hit);

        if (targetIdx === -1) return handleHit('miss'); // Spam penalty

        const n = state.activeNotes[targetIdx];
        const gap = Math.abs(n.time - now);

        if (gap <= CONFIG.windows.bad) {
            n.hit = true;
            document.getElementById(n.id).remove();
            state.activeNotes.splice(targetIdx, 1);
            
            if (gap <= CONFIG.windows.perfect) handleHit('perfect');
            else if (gap <= CONFIG.windows.good) handleHit('good');
            else handleHit('bad');
        } else {
            handleHit('miss');
        }
    }

    window.onkeydown = (e) => {
        if (e.key === 'Escape') togglePause();
        const idx = CONFIG.keys.indexOf(e.key.toLowerCase());
        if (idx !== -1 && !e.repeat) triggerInput(idx);
    };

    UI.receptors.forEach((r, i) => {
        r.ontouchstart = (e) => { e.preventDefault(); triggerInput(i); };
        r.onmousedown = () => triggerInput(i);
    });

    // --- Sistema de Regras ---
    function handleHit(type) {
        const s = state.stats;
        s[type]++;
        s.hits++;

        if (type === 'miss') {
            s.combo = 0;
            s.hp -= 10;
            if (window.navigator.vibrate) navigator.vibrate(50);
        } else {
            s.combo++;
            s.hp = Math.min(100, s.hp + 2);
            if (s.combo > s.maxCombo) s.maxCombo = s.combo;
        }

        const mult = Math.max(1, Math.floor(s.combo / 10));
        s.score += (type === 'perfect' ? 300 : type === 'good' ? 100 : 50) * mult;
        
        showJudgment(type);
        updateHUD();
        if (s.hp <= 0) finishGame(false);
    }

    function showJudgment(type) {
        const colors = { perfect: '#00ffcc', good: '#00ff00', bad: '#ffaa00', miss: '#ff3366' };
        UI.judgment.innerText = type.toUpperCase();
        UI.judgment.style.color = colors[type];
        UI.comboDiv.style.opacity = 1;
        document.getElementById('combo-num').innerText = state.stats.combo;
    }

    function updateHUD() {
        UI.scoreText.innerText = state.stats.score.toLocaleString();
        UI.hpBar.style.width = state.stats.hp + "%";
        UI.hpBar.style.background = state.stats.hp < 30 ? "var(--danger)" : "var(--primary)";
        const acc = (state.stats.perfect + state.stats.good*0.7) / (state.stats.hits || 1) * 100;
        UI.accText.innerText = acc.toFixed(1) + "%";
    }

    function togglePause() {
        if (state.isPaused) {
            UI.pause.classList.remove('active');
            state.startTime = audioCtx.currentTime - state.pauseTime;
            UI.player.play();
            state.isPaused = false;
            requestAnimationFrame(updateFrame);
        } else {
            UI.pause.classList.add('active');
            UI.player.pause();
            state.pauseTime = audioCtx.currentTime - state.startTime;
            state.isPaused = true;
        }
    }

    document.getElementById('resume-btn').onclick = togglePause;

    function finishGame(cleared) {
        state.isPlaying = false;
        UI.player.pause();
        UI.highway.style.display = 'none';
        UI.gameUI.style.display = 'none';
        UI.result.classList.add('active');

        const acc = parseFloat(UI.accText.innerText);
        let grade = "F";
        if (cleared) {
            if (acc > 95) grade = "S";
            else if (acc > 85) grade = "A";
            else if (acc > 70) grade = "B";
            else grade = "C";
        }

        document.getElementById('res-title').innerText = cleared ? "MÚSICA CONCLUÍDA!" : "FALHOU...";
        document.getElementById('res-grade').innerText = grade;
        document.getElementById('res-grade').style.color = grade === "S" ? "var(--primary)" : "white";
        document.getElementById('res-stats').innerHTML = `
            <b>PONTUAÇÃO:</b> ${state.stats.score.toLocaleString()}<br>
            <b>COMBO MÁXIMO:</b> ${state.stats.maxCombo}<br>
            <b>PRECISÃO:</b> ${acc}%<br><br>
            <span style="color:#00ffcc">PERFECTS: ${state.stats.perfect}</span><br>
            <span style="color:#ff3366">ERROS: ${state.stats.miss + (state.totalNotes - state.stats.hits)}</span>
        `;
    }
</script>
</body>
</html>
